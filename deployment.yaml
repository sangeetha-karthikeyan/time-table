apiVersion: v1
kind: Namespace
metadata:
  name: student-timetable
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-timetable-deployment
  namespace: student-timetable
  labels:
    app: student-timetable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: student-timetable
  template:
    metadata:
      labels:
        app: student-timetable
    spec:
      containers:
      - name: student-timetable
        image: student-timetable-app:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: student-timetable-service
  namespace: student-timetable
  labels:
    app: student-timetable
spec:
  type: NodePort
  selector:
    app: student-timetable
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: student-timetable-hpa
  namespace: student-timetable
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: student-timetable-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80