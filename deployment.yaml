apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-timetable-deployment
  labels:
    app: student-timetable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: student-timetable
  template:
    metadata:
      labels:
        app: student-timetable
    spec:
      containers:
      - name: student-timetable-container
        image: student-timetable-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5